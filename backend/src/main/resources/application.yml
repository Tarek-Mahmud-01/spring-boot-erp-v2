spring:
  application:
    name: guru-erp-backend

  datasource:
    # Points at the project-local docker Postgres on the custom port 55432.
    url: ${DB_URL:jdbc:postgresql://localhost:55432/guru_erp}
    username: ${DB_USER:guru}
    password: ${DB_PASSWORD:guru}
    hikari:
      pool-name: guru-erp-pool
      maximum-pool-size: 10

  jpa:
    # Flyway owns the schema — Hibernate only validates against it (ARCHITECTURE.md §2).
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

# Custom non-default backend port (ARCHITECTURE.md §0.2).
server:
  port: ${SERVER_PORT:58080}
  # The admin JWT carries the full permission set (150+ codes) and is sent as a
  # Bearer header, which can exceed Tomcat's 8KB default and trigger a 400
  # "Request header is too large". Raise the header cap to 64KB.
  max-http-request-header-size: 64KB
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

# Application-specific configuration.
app:
  notification:
    email:
      host: ${SMTP_HOST:}
      port: ${SMTP_PORT:587}
      username: ${SMTP_USERNAME:}
      password: ${SMTP_PASSWORD:}
      use-tls: ${SMTP_USE_TLS:true}
      from-email: ${SMTP_FROM_EMAIL:}
      from-name: ${SMTP_FROM_NAME:Guru ERP}
      fake-send: ${EMAIL_FAKE_SEND:true}
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-32-bytes-minimum-secret-key}
    access-ttl-minutes: ${JWT_ACCESS_TTL_MINUTES:30}
    refresh-ttl-days: ${JWT_REFRESH_TTL_DAYS:14}
    issuer: guru-erp

logging:
  pattern:
    # Include the request id (set by RequestIdFilter) in every log line.
    console: "%d{HH:mm:ss.SSS} %-5level [%X{requestId:-}] %logger{36} - %msg%n"
